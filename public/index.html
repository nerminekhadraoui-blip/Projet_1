<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BestCall x Wengo — Tableaux de bord</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="landing-body">
  <main class="landing">
    <header class="landing-header">
      <img src="./images/bestcall-wengo.png" alt="BestCall x Wengo" class="landing-logo" />
      <h1>Tableaux de bord opérationnels</h1>
      <p class="landing-subtitle">Choisissez le service à consulter</p>
    </header>

    <section class="landing-services" id="services-grid">
      <!-- Cartes injectées par JS -->
    </section>

    <footer class="landing-footer">
      <small>BestCall x Wengo · Suivi opérationnel</small>
    </footer>
  </main>

  <script>
    (async function () {
      const grid = document.getElementById('services-grid');
      try {
        const res = await fetch('./dashboards/manifest.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('Manifest introuvable (' + res.status + ')');
        const data = await res.json();
        const services = data.services || {};

        const entries = Object.entries(services);
        if (entries.length === 0) {
          grid.innerHTML = '<p class="landing-empty">Aucun service disponible.</p>';
          return;
        }

        grid.innerHTML = entries.map(([key, svc]) => {
          const count = Array.isArray(svc.dashboards) ? svc.dashboards.length : 0;
          const countLabel = count === 0
            ? 'Aucun tableau de bord pour le moment'
            : (count + ' tableau' + (count > 1 ? 'x' : '') + ' de bord');
          return `
            <a class="service-card" href="./app.html?service=${encodeURIComponent(key)}">
              <div class="service-card-icon">${svc.icon || '📊'}</div>
              <div class="service-card-body">
                <h2>${svc.label || key}</h2>
                <p>${svc.description || ''}</p>
                <span class="service-card-count">${countLabel}</span>
              </div>
              <div class="service-card-arrow">→</div>
            </a>
          `;
        }).join('');
      } catch (e) {
        grid.innerHTML = '<p class="landing-error">Erreur de chargement : ' + e.message + '</p>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
